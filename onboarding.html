<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelpHub AI | Onboarding</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/styles.css">

</head>

<body data-page="onboarding">

  <!-- NAVBAR -->
  <header class="topbar">
    <div class="container nav">

      <a class="brand" href="./index.html">
        <span class="brand-badge">H</span>
        <span>HelpHub AI</span>
      </a>

      <nav class="nav-links">
        <a href="./dashboard.html">Dashboard</a>
        <a href="./explore.html">Explore</a>
        <a href="./leaderboard.html">Profile</a>
      </nav>

    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- HERO -->
    <section class="page-hero">
      <div class="panel">

        <p class="eyebrow">Onboarding</p>

        <h1 style="font-size: clamp(2.2rem, 4vw, 4rem);">
          Shape your support identity with AI suggestions.
        </h1>

        <p>
          Name your strengths, interests, and location so the system can recommend
          where you can help and where you may need backup.
        </p>

      </div>
    </section>

    <!-- FORM + AI PANEL -->
    <section class="two-col section">

      <!-- FORM -->
      <form class="form-card stack" data-onboarding-form>

        <div class="field">
          <label>Switch demo user</label>
          <select data-user-switch></select>
        </div>

        <div class="form-grid">

          <div class="field">
            <label>Name</label>
            <input type="text" name="name">
          </div>

          <div class="field">
            <label>Location</label>
            <input type="text" name="location">
          </div>

          <div class="field-full">
            <label>Skills</label>
            <input type="text" name="skills" placeholder="JavaScript, UI/UX, Public Speaking">
          </div>

          <div class="field-full">
            <label>Interests</label>
            <input type="text" name="interests" placeholder="Hackathons, mentoring, startups">
          </div>

        </div>

        <button class="btn btn-primary" type="submit">
          Save onboarding
        </button>

      </form>

      <!-- AI PANEL -->
      <aside class="panel stack">

        <div>
          <p class="section-kicker">AI suggestions</p>
          <h2>Your likely contribution map</h2>
        </div>

        <div data-onboarding-ai></div>

      </aside>

    </section>

  </main>

</body>

</html>
