<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - HelpHub AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar">
    <a href="./index.html" class="logo">
      <span class="logo-icon">H</span>
      <span class="logo-text">HelpHub AI</span>
    </a>
    <div class="nav-links mobile-text-links">
      <a href="./dashboard.html">Dashboard</a>
      <a href="./oonboarding.html">Onboarding</a>
      <a href="./leaderboard.html" class="active-nav-btn">Profile</a>
    </div>
  </nav>

  <div class="profile-wrapper">
    <div class="profile-header-card">
      <small>PROFILE</small>
      <h1>Ayesha Khan </h1>
      <p>Both • Karachi</p>
    </div>

    <div class="profile-content">

      <div class="profile-card">
        <span class="profile-card-label">PUBLIC PROFILE</span>
        <h2>Skills and reputation</h2>

        <div class="profile-stat">
          <span>Trust score</span>
          <strong>100%</strong>
        </div>
        <div class="profile-stat">
          <span>Contributions</span>
          <strong>35</strong>
        </div>

        <div class="profile-tags-group">
          <h4>Skills</h4>
          <div class="tags">
            <span class="profile-tag">Figma</span>
            <span class="profile-tag">UI/UX</span>
            <span class="profile-tag">HTML/CSS</span>
            <span class="profile-tag">Career Guidance</span>
          </div>
        </div>

        <div class="profile-tags-group">
          <h4>Badges</h4>
          <div class="tags">
            <span class="profile-tag">Design Ally</span>
            <span class="profile-tag">Fast Responder</span>
            <span class="profile-tag">Top Mentor</span>
          </div>
        </div>
      </div>

      <div class="profile-card">
        <span class="profile-card-label">EDIT PROFILE</span>
        <h2>Update your identity</h2>

        <form action="#">
          <div class="profile-form-row">
            <div class="form-group">
              <label>Name</label>
              <input type="text" value="Muhammad Affan">
            </div>
            <div class="form-group">
              <label>Location</label>
              <input type="text" value="Karachi">
            </div>
          </div>

          <div class="form-group">
            <label>Skills</label>
            <input type="text" value="Figma, UI/UX, HTML/CSS, Career Guidance">
          </div>

          <div class="form-group">
            <label>Interests</label>
            <input type="text" value="Hackathons, UI/UX, Community Building">
          </div>

          <button type="submit" class="save-profile-btn">Save profile</button>
        </form>
      </div>

    </div>
  </div>

</body>

</html>
